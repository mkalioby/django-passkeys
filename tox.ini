[tox]
envlist=
    py310-django{42,51,52,60},fido2,
    py311-django{42,51,52,60},fido2,
    py312-django{42,51,52,60},fido2,
    py313-django{42,51,52,60},fido2,
    py314-django{52,60},fido2,


[testenv]
changedir=
    example/
deps =
    fido2: fido2==2.0.0
    django42: django>=4.2,<4.3
    django51: django>=5.1,<5.2
    django52: django>=5.2,<5.3
    django60: django>=6.0,<6.1
    ua-parser
    user-agents
    django-sslserver
    -rrequirements_test.txt

setenv =
    DJANGO_SETTINGS_MODULE = test_app.test_settings
allowlist_externals =
    coverage
commands =
    coverage run manage.py test