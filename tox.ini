[tox]
envlist=
    #docs,
    py37-django{20,21,22,32}-fido1,
    py38-django{20,21,22,32,40,41,42},fido1,
    py39-django{22,32,40,41,42},fido1,
    py310-django{22,32,40,41,42,50,51,52}-fido{1,2,21},
    py311-django{22,32,40,41,42,50,51,52,60}-fido{1,2,21},
    py312-django{41,42,50,51,52,60},fido{1,2,21},
    py313-django{50,51,52,60}-fido{1,2,2.1},
    py314-django{52,60}-fido{1,2,2.1},

[testenv]
changedir=
    example/
deps =
    fido1: fido2>=1.1.0,<2.0
    fido20: fido2>=2.0.0,<2.1
    fido21: fido2>=2.1,<2.2
    django22: django>=2.2,<2.3
    django32: django>=3.2,<3.3
    django40: django>=4.0,<4.1
    django41: django>=4.1,<4.2
    django42: django>=4.2,<4.3
    django50: django>=5.0,<5.1
    django51: django>=5.1,<5.2
    django52: django>=5.2,<5.3
    django6: django>=6.0,<6.1
    ua-parser
    user-agents
    django-sslserver
    -rrequirements_test.txt

setenv =
    DJANGO_SETTINGS_MODULE = test_app.test_settings
allowlist_externals =
    coverage
commands =
    coverage run manage.py test

